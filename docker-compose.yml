services:
  postgres:
    image: postgres:16-alpine
    container_name: avito-masspost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: avito_masspost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - avito_masspost_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d avito_masspost"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  avito_masspost_pgdata:
